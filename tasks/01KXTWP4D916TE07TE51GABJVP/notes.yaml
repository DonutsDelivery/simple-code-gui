notes:
  - _ulid: 01KXTWP4D8JHPZ1N43J4RMY1P1
    content: >-
      Implementation notes (auto-generated from spec):


      A spatial workspace can hold editable notes, managed images, and sketches alongside running
      terminal sessions, with shared spatial organization and durable per-workspace state.



      Acceptance Criteria:

      - ac-1: Given a Canvas workspace contains terminals and non-terminal content, when the user
      selects, moves, resizes, groups, or arranges mixed items, then all selected items follow the
      requested spatial operation while terminal sessions continue running unchanged

      - ac-2: Given the Canvas surface has keyboard focus, when the user invokes the visible zoom
      controls or the plus and minus shortcuts, then the camera zooms within its supported range
      without consuming text intended for a terminal or content editor

      - ac-3: Given a workspace contains notes, images, or sketches, when the workspace is switched
      away from, restored after restart, or saved through the mobile projection, then the content,
      geometry, grouping, and asset references remain unchanged
    supersedes: null
    author: DonutsDelivery
    created_at: 2026-07-18T15:14:30.440Z
  - _ulid: 01KXTWQ5Z8FBFECWTXJ8K8SPZ1
    content: "Approach: extend scene v2 with a separate objects collection so PTY reconciliation and
      xterm budgets remain terminal-only; reuse existing camera/geometry/group helpers through a
      shared spatial-item layer. Store validated PNG/JPEG/WebP copies in a constrained main-process
      asset manager and persist opaque IDs only. Notes commit on idle/blur; sketches persist
      editable strokes and derive a current managed PNG before Copy path. Edge cases: v1 migration,
      malformed/future scenes, missing assets, stale async sketch exports, input shortcut
      suppression, lazy workspaces, and mobile preservation. Test plan: behavioral coverage for
      every feature/child AC plus asset security and isolated restart/runtime verification. Branch
      starts from the existing Canvas 2.0 commit because this feature depends on it; inherited
      dirty-tree changes remain untouched."
    supersedes: null
    author: DonutsDelivery
    created_at: 2026-07-18T15:15:04.808Z
  - _ulid: 01KXTXX9F5N12NM4S4XYA6V7EZ
    content: "Scene v2 foundation complete: separate content objects with exact kind-based schema; v0/v1
      migration; bounded validation; terminal reconciliation preserves objects; orphan terminals
      account for object bounds/layering. Verified 37 focused tests and production build."
    supersedes: null
