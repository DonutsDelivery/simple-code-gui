    content: "Canvas keyboard capture now ignores descendant targets; middle mousedown is cancelled in
      capture phase while pointer panning remains active. Verified focused Canvas tests and isolated
      runtime: Escape stayed with xterm, wheel zoomed, and middle mousedown was prevented before
      xterm while the camera panned."
