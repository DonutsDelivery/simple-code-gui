notes:
  - _ulid: 01KXTB2VMSVDY0X4TJ0KWKFS4Z
    content: >-
      Implementation notes (auto-generated from spec):


      A workspace can present its running sessions as persistent modular nodes on an unbounded
      spatial surface while retaining the existing tiled view as an independent alternative.



      Acceptance Criteria:

      - ac-1: Given a workspace contains running sessions and saved tile and spatial arrangements,
      when the user switches between Tiles and Canvas, then the same sessions remain running while
      each view preserves its own arrangement

      - ac-2: Given a workspace was last used in Canvas with positioned nodes, when the application
      restarts and restores that workspace, then the workspace returns to its saved view, node
      arrangement, and camera without losing the tiled arrangement

      - ac-3: Given a session belongs to a workspace with both views available, when the session is
      created, closed, resumed, or moved to another workspace, then both views reflect the same
      session membership without duplicating or restarting unaffected sessions
    supersedes: null
    author: DonutsDelivery
    created_at: 2026-07-18T10:06:53.082Z
  - _ulid: 01KXTBAGQTA6F32FDM2W31NSZV
    content: "Approach: keep Electron/React/xterm and add Canvas as an independent per-workspace view
      sharing PTYs with Tiles. Build a typed scene model first, then persistence/view integration,
      interaction and virtualization, premium visual/accessibility, and isolated performance
      verification. Reuse the existing PTY replay, tile projection, workspace lazy restore, theme
      tokens, and debug harness. Edge cases include malformed/future scene versions, inactive
      workspace saves, PTY ID remapping, offscreen terminal suspension, negative world coordinates,
      and switching views without duplicate subscriptions. Tests will annotate the Canvas feature
      and child requirement ACs."
    supersedes: null
    author: DonutsDelivery
    created_at: 2026-07-18T10:11:04.058Z
  - _ulid: 01KXTBRXS79DSX84NZYDPD3X9S
    content: "Scene foundation complete: added versioned model, geometry/camera math, migration
      validation with future-version preservation, tile/tab projection and reconciliation,
      visibility/semantic zoom, and mount budgeting. Focused result: 3 Vitest files, 22 tests
      passed. No Canvas TypeScript errors were reported; global noEmit remains blocked by unrelated
      pre-existing main-process errors."
    supersedes: null
    author: DonutsDelivery
