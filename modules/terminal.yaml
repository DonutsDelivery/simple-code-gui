  - _ulid: 01KQXX0JMZ8TPYXDFF3V5DZ061
    slugs:
      - mobile-live-attach
    title: Mobile Live Session Attach
    type: feature
    description: When the mobile client opens a session that is already running on the desktop, it
      attaches to the desktop's live PTY (subscribes to its byte stream and writes back to the same
      process) instead of spawning a parallel `--resume` process. Parallel resumes branch the
      conversation because each fork writes turns to the backend's session file independently, so
      the desktop sees a stale view after the phone has interacted.
    status:
      maturity: draft
      implementation: implemented
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: a session is running on the desktop with sessionId X for project P
        id: ac-1
        then: the mobile client attaches to the existing PTY (no new `--resume` process is spawned) and
          receives a replay of recent output so its terminal renders the current screen
        when: the mobile client opens that same session (P, X)
      - given: the mobile client is attached to a desktop-owned PTY
        id: ac-2
        then: the keystrokes and output are visible on the mobile client in real time, and vice versa,
          because both clients are subscribed to the same PTY byte stream
        when: the user types on the desktop
      - given: the mobile client is attached to a desktop-owned PTY
        id: ac-3
        then: only the mobile WebSocket subscription is torn down — the underlying PTY process is NOT
          killed, and the desktop session continues uninterrupted
        when: the user closes the tab on the mobile client
      - given: the mobile client is attached to a desktop-owned PTY
        id: ac-4
        then: the resize is dropped (the PTY dimensions are owned by the spawning client) so the desktop's
          terminal is not garbled
        when: the mobile client sends a resize message
    tags: []
    created: 2026-05-06T00:00:00.000Z
    notes: []
