  - _ulid: 01KXV7BC0E7XY9NH18WSD7NG42
    slugs:
      - agent-session-notifications
    title: Agent Session Notifications
    type: feature
    description: Agent sessions explicitly signal when work is complete or user input is required, so
      people receive distinct audio cues and persistent attention indicators even when the session
      is hidden.
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: an agent session reports that its requested work is complete
        id: ac-1
        then: the app plays the configured completion cue once and identifies the emitting session
        when: the completion signal is received
      - given: an agent session cannot continue without a user response
        id: ac-2
        then: the app plays the configured input-needed cue once and identifies the emitting session
        when: the input-needed signal is received
      - given: a signal is emitted by a session that is not currently visible
        id: ac-3
        then: the emitting tab and its workspace remain visibly marked with the signal severity until that
          tab is opened
        when: the app receives the signal
      - given: a signal is emitted by a session that is already visible
        id: ac-4
        then: the cue plays without leaving an unread attention marker
        when: the app receives the signal
      - given: a project uses any supported agent backend
        id: ac-5
        then: the backend instruction file contains idempotent guidance for emitting completion and
          input-needed signals without changing surrounding user content
        when: the app installs managed harness instructions
      - given: notification sounds are configured independently from spoken voice output
        id: ac-6
        then: the notification preference persists and does not alter voice output settings
        when: the user changes notification enablement or volume
    priority: high
