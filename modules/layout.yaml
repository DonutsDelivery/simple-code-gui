  - _ulid: 01KQTHPRWXVY2C4253R9QDYJ2H
    slugs:
      - multi-workspace-persistence
    title: Multi-Workspace Persistence
    type: feature
    description: The user can have multiple named workspaces (each one a saved set of tabs/tiles) and
      switch between them. Workspaces are restored lazily — only the active one spawns PTYs at
      startup; inactive ones keep their saved tab/tile data parked until switched into. The complete
      set of workspaces and their saved contents must survive desktop restart and must be readable
      via the mobile-server `/api/workspace` endpoint so the Android client can list and open every
      workspace, not only the previously-active one.
    status:
      maturity: draft
      implementation: implemented
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: the user has two or more workspaces and only the first has been switched into during the
          current session
        id: ac-1
        then: every workspace's saved tabs and tile tree are preserved on disk — unswitched workspaces must
          not be flushed to empty
        when: the desktop app saves workspace state
      - given: the desktop app is restarted with multiple workspaces previously persisted
        id: ac-2
        then: every workspace appears in the switcher with its saved tabs intact and switching into any one
          of them restores its PTYs
        when: the workspace loader reads workspace.json
      - given: the desktop has multiple populated workspaces
        id: ac-3
        then: the response contains every workspace with its full openTabs/tileTree, allowing the mobile
          client to open any workspace, not just the first
        when: the Android APK calls GET /api/workspace via the mobile server
    tags: []
    created: 2026-05-05T00:00:00.000Z
    notes: []
