  - _ulid: 01KK67C21DPVGAHNPTREZFH029
    slugs:
      - tiled-layout
    title: Tiled Terminal Layout
    type: feature
    description: Flexible grid layout where terminals are positioned as tiles using percentage-based
      coordinates. Supports splitting, swapping, and multi-tab tiles on a pannable canvas.
    status:
      maturity: draft
      implementation: implemented
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: user is in tiled view mode
        id: ac-1
        then: a new tile is added to the layout with percentage-based coordinates and the terminal renders
          inside it
        when: a new session is opened
      - given: multiple tiles exist on the canvas
        id: ac-2
        then: the tile divides into two tiles in the specified direction (top/bottom/left/right) each
          getting half the space
        when: a tile is split
    tags: []
    created: 2026-03-08T08:00:13.357Z
    notes: []
  - _ulid: 01KK67C43QN01EYHYHABV8BBVE
    slugs:
      - tile-drag-drop
    title: Tile Drag & Drop
    type: feature
    description: Drag projects from sidebar or tabs between tiles. Drop zones support swap,
      split-top/bottom/left/right. Visual preview during drag.
    status:
      implementation: implemented
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: a tile contains two or more tabs
        id: ac-1
        then: the dragged tab is removed from its source tile and becomes its own tile split in that
          direction; no tab is lost
        when: the user drags one of its sub-tabs to the edge zone of any tile (including its own) and drops
      - given: the user is dragging a sub-tab, tile, or sidebar project
        id: ac-2
        then: a new tile is created as a new column (right) or row (bottom) containing the dragged
          tab/session, with a visible drop-zone preview before the drop
        when: they drop it on empty canvas space outside all tiles (right of or below the layout)
      - given: a tile contains two or more tabs
        id: ac-3
        then: the tab order within the tile changes to match the drop position, an insertion indicator is
          shown during the drag, and the order persists across app restart
        when: the user drags a sub-tab over its own tile's tab strip and drops between two tabs
    tags: []
