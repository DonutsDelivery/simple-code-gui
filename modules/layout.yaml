    created: 2026-03-08T08:00:13.357Z
    acceptance_criteria:
      - id: ac-1
        given: user is in tiled view mode
        when: a new session is opened
        then: a new tile is added to the layout with percentage-based coordinates and the terminal renders
          inside it
      - id: ac-2
        given: multiple tiles exist on the canvas
        when: a tile is split
        then: the tile divides into two tiles in the specified direction (top/bottom/left/right) each
          getting half the space
