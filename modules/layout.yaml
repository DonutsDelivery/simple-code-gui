  - _ulid: 01KTQRNAECTYZHG726T93KA18V
    slugs:
      - tile-maximize
    title: Tile Maximize & Equalize
    type: feature
    description: Temporarily maximize one tile to fill the canvas (keyboard, header double-click, or
      header button) without mutating the tile tree; restore returns the previous layout. Equalize
      resets all branch ratios to equal sizes. Maximize state is transient (not persisted);
      terminals stay mounted so scrollback/PTY state survives.
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: multiple tiles are laid out
        id: ac-1
        then: the tile fills the canvas and on restore the exact previous layout and all terminal scrollback
          are intact
        when: the user maximizes one tile and then restores it
      - given: branch ratios have been resized unevenly
        id: ac-2
        then: all sibling tiles at every level return to equal sizes
        when: the user triggers equalize layout
    tags: []
    created: 2026-06-10T03:19:20.781Z
    notes: []
  - _ulid: 01KTQRNBKC5AW23E8PH0C4PK8Y
    slugs:
      - window-management
    title: Window State & Multi-Window
    type: feature
    description: Window bounds, maximized and fullscreen state persist across restarts; saved bounds are
      validated against connected displays so the window never restores off-screen. Window state
      changes are pushed to the renderer (no polling). A workspace can be detached into its own OS
      window and returns to the primary window when that window closes; PTYs keep running in the
      main process throughout.
    depends_on: []
    implements: []
    relates_to: []
    tests: []
    traits: []
    acceptance_criteria:
      - given: the app was closed while maximized or fullscreen
        id: ac-1
        then: the window restores maximized/fullscreen with the correct pre-maximize bounds remembered
        when: it is launched again
      - given: saved window bounds reference a display that is no longer connected
        id: ac-2
        then: the window appears fully visible on a connected display instead of off-screen
        when: the app launches
      - given: a workspace is open in the primary window
        id: ac-3
        then: the workspace moves to a new OS window with its terminals attached to the same running PTYs
          (no respawn), and closing that window returns the workspace to the primary window
        when: the user chooses Open in new window on its switcher tab
      - given: workspaces are split across multiple windows
        id: ac-4
        then: no window's save clobbers sessions owned by another window — workspace.json always contains
          every session
        when: any window saves workspace state
    tags: []
    created: 2026-06-10T03:19:21.965Z
    notes: []
